<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== Theme Toggle (top-right) ===== -->
  <button id="btn-theme-toggle" class="btn btn-ghost theme-toggle" aria-label="Switch to light mode">
    ☀️ Light
  </button>

  <!-- ===== Greeting Panel ===== -->
  <section id="greeting-panel" class="panel">
    <div id="clock" class="clock">00:00:00</div>
    <div id="date-display" class="date-display">Monday, 1 January 2025</div>
    <div id="greeting" class="greeting">Good Morning</div>
    <!-- Custom name input -->
    <div class="name-row">
      <input
        type="text"
        id="name-input"
        class="text-input name-input"
        placeholder="Enter your name…"
        maxlength="256"
        aria-label="Your name for personalised greeting"
      />
      <button id="btn-save-name" class="btn btn-primary">Save Name</button>
    </div>
  </section>

  <!-- ===== Focus Timer ===== -->
  <section id="focus-timer" class="panel">
    <h2 class="panel-title">Focus Timer</h2>
    <div id="timer-display" class="timer-display">25:00</div>
    <div class="timer-controls">
      <button id="btn-start" class="btn btn-primary">Start</button>
      <button id="btn-stop" class="btn btn-secondary">Stop</button>
      <button id="btn-reset" class="btn btn-ghost">Reset</button>
    </div>
    <!-- Custom duration input -->
    <div class="duration-row">
      <input
        type="number"
        id="duration-input"
        class="text-input duration-input"
        placeholder="Minutes (1–180)"
        min="1"
        max="180"
        aria-label="Custom timer duration in minutes"
      />
      <button id="btn-set-duration" class="btn btn-ghost">Set</button>
    </div>
    <div id="duration-error" class="error-msg" aria-live="polite"></div>
  </section>

  <!-- ===== To-Do List ===== -->
  <section id="todo-list" class="panel">
    <h2 class="panel-title">To-Do List</h2>
    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        class="text-input"
        placeholder="Add a new task…"
        aria-label="New task text"
      />
      <button id="btn-add-task" class="btn btn-primary">Add</button>
    </div>
    <div id="task-error" class="error-msg" aria-live="polite"></div>
    <!-- Sort controls -->
    <div class="sort-row" role="group" aria-label="Sort tasks">
      <span class="sort-label">Sort:</span>
      <button class="btn btn-ghost btn-sort active-sort" data-sort="date-added">Date Added</button>
      <button class="btn btn-ghost btn-sort" data-sort="alphabetical">A–Z</button>
      <button class="btn btn-ghost btn-sort" data-sort="completion-status">Status</button>
    </div>
    <ul id="task-list" class="task-list" aria-label="Task list"></ul>
  </section>

  <!-- ===== Quick Links ===== -->
  <section id="quick-links" class="panel">
    <h2 class="panel-title">Quick Links</h2>
    <div class="input-row">
      <input
        type="text"
        id="link-label-input"
        class="text-input"
        placeholder="Label"
        aria-label="Link label"
      />
      <input
        type="url"
        id="link-url-input"
        class="text-input"
        placeholder="https://example.com"
        aria-label="Link URL"
      />
      <button id="btn-add-link" class="btn btn-primary">Add</button>
    </div>
    <div id="links-container" class="links-container" aria-label="Quick links"></div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
